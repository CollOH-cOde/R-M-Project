<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — R &amp; M Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── ADMIN LAYOUT ─────────────────────────── */
    body { display: flex; min-height: 100vh; overflow-x: hidden; }

    /* ── LOGIN SCREEN ────────────────────────── */
    .admin-login {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,163,115,.12) 0%, transparent 65%);
      padding: 2rem;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,.04); border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg); padding: 2.5rem;
      backdrop-filter: blur(20px); animation: slideUp .45s ease;
    }
    .login-card img { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; margin: 0 auto 1.5rem; display: block; }
    .login-card h2 { font-family: var(--font-serif); font-size: 2rem; font-weight: 600; text-align: center; }
    .login-card p { text-align: center; color: var(--white-50); font-size: .85rem; margin: .3rem 0 1.75rem; }
    .admin-back { display: inline-flex; align-items: center; gap: .4rem; font-size: .82rem; color: var(--white-50); margin-top: 1.25rem; width: 100%; justify-content: center; transition: color var(--transition); }
    .admin-back:hover { color: var(--gold); }

    /* ── SIDEBAR ─────────────────────────────── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--black-2); border-right: 1px solid var(--glass-border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 200; transition: transform var(--transition);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: .85rem; padding: 1.5rem 1.25rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .sidebar-brand img { width: 38px; height: 38px; border-radius: 9px; object-fit: cover; }
    .sidebar-brand h2 { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; line-height: 1.1; }
    .sidebar-brand h2 em { color: var(--gold); font-style: italic; }
    .sidebar-brand span { font-size: .72rem; color: var(--white-50); }
    .sidebar-nav { flex: 1; padding: 1.25rem 0.75rem; display: flex; flex-direction: column; gap: .15rem; overflow-y: auto; }
    .nav-label { font-size: .67rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--white-50); padding: .75rem .65rem .35rem; }
    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .85rem; border-radius: 8px;
      font-size: .85rem; color: var(--white-70);
      cursor: pointer; background: none; border: none;
      transition: all var(--transition); font-family: var(--font-sans);
      text-align: left; width: 100%; text-decoration: none;
    }
    .nav-item:hover { background: var(--white-10); color: var(--white); }
    .nav-item.active { background: var(--gold-alpha); color: var(--gold); }
    .nav-item i { width: 16px; text-align: center; font-size: .9rem; }
    .nav-item-danger { color: #e74c3c !important; }
    .nav-item-danger:hover { background: rgba(231,76,60,.1) !important; }
    .sidebar-footer { padding: .85rem; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: .15rem; }

    /* ── MAIN ────────────────────────────────── */
    .admin-main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOPBAR ──────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem;
      padding: 1.25rem 2rem;
      background: rgba(8,8,8,.8); border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .topbar-left h1 { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 600; }
    .topbar-left p { font-size: .8rem; color: var(--white-50); }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }
    .admin-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
      padding: .3rem .75rem; border-radius: 20px;
      background: var(--gold-alpha); color: var(--gold); border: 1px solid rgba(212,163,115,.3);
    }
    .mobile-ham { display: none; }

    /* ── CONTENT ─────────────────────────────── */
    .admin-content { flex: 1; padding: 2rem; }

    /* ── STAT CARDS ──────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; margin-bottom: 2rem; }
    .stat-card {
      display: flex; align-items: center; gap: 1rem; padding: 1.4rem;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); transition: all var(--transition);
    }
    .stat-card:hover { border-color: rgba(212,163,115,.2); transform: translateY(-2px); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .si-gold   { background: var(--gold-alpha);               color: var(--gold); }
    .si-green  { background: rgba(39,174,96,.15);             color: #27ae60; }
    .si-blue   { background: rgba(52,152,219,.15);            color: #3498db; }
    .si-orange { background: rgba(243,156,18,.15);            color: #f39c12; }
    .stat-info p { font-size: .8rem; color: var(--white-50); margin-bottom: .2rem; }
    .stat-info h3 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 600; line-height: 1; }

    /* ── TWO-COL ─────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    /* ── ADMIN CARD ──────────────────────────── */
    .admin-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--glass-border);
    }
    .card-head strong { font-size: .95rem; }

    /* ── TABLE ───────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      padding: .7rem 1rem; text-align: left; font-size: .73rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
      color: var(--white-50); border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
    }
    .admin-table td { padding: .85rem 1rem; font-size: .85rem; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--white-05); }
    .td-muted { color: var(--white-50); }
    .product-cell { display: flex; align-items: center; gap: .75rem; }
    .product-thumb { width: 40px; height: 40px; border-radius: 7px; object-fit: cover; flex-shrink: 0; }
    .product-cell strong { font-size: .85rem; display: block; }
    .product-cell span { font-size: .75rem; color: var(--white-50); }

    /* ── TOOLBAR ─────────────────────────────── */
    .section-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .85rem; margin-bottom: 1.25rem;
    }
    .toolbar-left { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .admin-search { position: relative; }
    .admin-search i { position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); color: var(--white-50); font-size: .8rem; pointer-events: none; }
    .admin-search input {
      padding: .55rem .85rem .55rem 2.2rem; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: 8px; font-size: .82rem;
      color: var(--white); outline: none; width: 200px; transition: border-color var(--transition);
    }
    .admin-search input:focus { border-color: var(--gold); }
    .admin-search input::placeholder { color: var(--white-50); }
    .admin-select {
      padding: .55rem .85rem; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: 8px; font-size: .82rem;
      color: var(--white); outline: none; cursor: pointer; transition: border-color var(--transition);
    }
    .admin-select:focus { border-color: var(--gold); }
    .admin-select option { background: var(--black-3); }
    .status-select {
      padding: .3rem .6rem; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: 6px; font-size: .78rem;
      color: var(--white); outline: none; cursor: pointer;
    }
    .status-select:focus { border-color: var(--gold); }
    .status-select option { background: var(--black-3); }

    /* ── PRODUCT MODAL ───────────────────────── */
    .prod-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .fg-full { grid-column: 1/-1; }
    .img-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; margin-top: .75rem; border: 1px solid var(--glass-border); }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── CONFIRM MODAL ───────────────────────── */
    .confirm-icon { font-size: 2.5rem; text-align: center; margin-bottom: .75rem; }
    .confirm-modal h4 { font-size: 1.1rem; font-weight: 600; text-align: center; margin-bottom: .4rem; }
    .confirm-modal p { font-size: .85rem; color: var(--white-50); text-align: center; margin-bottom: 1.5rem; }
    .confirm-actions { display: flex; gap: .75rem; }

    /* ── SECTION ANIM ────────────────────────── */
    .section-content { animation: fadeIn .3s ease; }

    /* ── SIDEBAR BACKDROP ─────────────────────── */
    .sidebar-backdrop { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,.7); }

    /* ── MOBILE ──────────────────────────────── */
    @media (max-width:1024px){
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width:768px){
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-backdrop.open { display: block; }
      .admin-main { margin-left: 0; }
      .mobile-ham { display: flex; }
      .admin-content { padding: 1.25rem; }
      .stats-grid { grid-template-columns: repeat(2,1fr); gap: .85rem; }
      .topbar { padding: 1rem; }
      .topbar-left h1 { font-size: 1.35rem; }
      .prod-modal-grid { grid-template-columns: 1fr; }
    }
    @media (max-width:480px){
      .stats-grid { grid-template-columns: 1fr 1fr; gap: .65rem; }
      .stat-card { padding: 1rem; }
      .stat-icon { width: 40px; height: 40px; }
      .stat-info h3 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <!-- ── LOGIN SCREEN ────────────────────────── -->
  <div class="admin-login" id="login-screen">
    <div class="login-card">
      <img src="/images/logo.jpg" alt="Logo" onerror="this.style.display='none'">
      <h2>Admin Panel</h2>
      <p>R &amp; M Collection — Staff Access Only</p>
      <div id="login-err" class="form-error" style="display:none"></div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="admin-email" placeholder="admin@rmcollection.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="admin-pw" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>
      <button class="btn btn-gold btn-full btn-lg" id="admin-login-btn">
        <i class="fa-solid fa-shield-halved"></i> Login to Dashboard
      </button>
      <a href="/" class="admin-back"><i class="fa-solid fa-arrow-left fa-xs"></i> Back to store</a>
    </div>
  </div>

  <!-- ── DASHBOARD ───────────────────────────── -->
  <div id="dashboard" style="display:none; width:100%; display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="/images/logo.jpg" alt="Logo" onerror="this.style.display='none'">
        <div>
          <h2>R &amp; <em>M</em></h2>
          <span>Admin Panel</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-label">Overview</span>
        <button class="nav-item active" data-section="overview"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
        <span class="nav-label">Store</span>
        <button class="nav-item" data-section="products"><i class="fa-solid fa-shirt"></i> Products</button>
        <button class="nav-item" data-section="orders"><i class="fa-solid fa-box"></i> Orders</button>
        <button class="nav-item" data-section="customers"><i class="fa-solid fa-users"></i> Customers</button>
      </nav>
      <div class="sidebar-footer">
        <a href="/" class="nav-item"><i class="fa-solid fa-store"></i> View Storefront</a>
        <button class="nav-item nav-item-danger" id="admin-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- MAIN -->
    <div class="admin-main">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="btn btn-ghost btn-sm mobile-ham" id="mobile-ham"><i class="fa-solid fa-bars"></i></button>
          <div>
            <h1 id="section-title">Dashboard</h1>
            <p id="section-sub">Welcome back, <span id="admin-name" style="color:var(--gold)"></span></p>
          </div>
        </div>
        <div class="topbar-right">
          <span class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin</span>
          <a href="/" class="btn btn-ghost btn-sm"><i class="fa-solid fa-store"></i> Storefront</a>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="admin-content" id="admin-content">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
  /* ── STATE ──────────────────────────────────── */
  let adminUser = null;
  let products  = [], orders = [], customers = [];
  let currentSection = 'overview';

  /* ── LOGIN ──────────────────────────────────── */
  document.getElementById('admin-login-btn').addEventListener('click', doAdminLogin);
  document.getElementById('admin-pw').addEventListener('keydown', e => { if(e.key==='Enter') doAdminLogin(); });

  async function doAdminLogin(){
    const email = document.getElementById('admin-email').value.trim();
    const pw    = document.getElementById('admin-pw').value;
    const errEl = document.getElementById('login-err');
    errEl.style.display='none';
    if(!email||!pw){ errEl.textContent='Please enter your email and password.'; errEl.style.display='block'; return; }
    const btn = document.getElementById('admin-login-btn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Logging in…';
    try{
      const data = await API.post('/auth/login',{email,password:pw});
      if(data.user.role!=='admin'){ errEl.textContent='Access denied. Admins only.'; errEl.style.display='block'; btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-shield-halved"></i> Login to Dashboard'; return; }
      Auth.save(data.user,data.token);
      adminUser=data.user;
      showDashboard();
    }catch(err){
      errEl.textContent=err.message||'Login failed.'; errEl.style.display='block';
      btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-shield-halved"></i> Login to Dashboard';
    }
  }

  /* ── CHECK EXISTING SESSION ─────────────────── */
  document.addEventListener('DOMContentLoaded',()=>{
    const user=Auth.getUser();
    if(user&&user.role==='admin'){ adminUser=user; showDashboard(); }
  });

  /* ── SHOW DASHBOARD ─────────────────────────── */
  function showDashboard(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    document.getElementById('admin-name').textContent=adminUser.name.split(' ')[0];
    loadAll();
    bindSidebar();
  }

  /* ── SIDEBAR ────────────────────────────────── */
  function bindSidebar(){
    document.querySelectorAll('.nav-item[data-section]').forEach(btn=>{
      btn.addEventListener('click',()=>{ navigateTo(btn.dataset.section); closeSidebar(); });
    });
    document.getElementById('admin-logout').addEventListener('click',()=>{ Auth.logout(); location.reload(); });
    document.getElementById('mobile-ham').addEventListener('click',()=>{
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('open');
    });
    document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);
  }
  function closeSidebar(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
  function navigateTo(sec){
    currentSection=sec;
    document.querySelectorAll('.nav-item[data-section]').forEach(b=>b.classList.toggle('active',b.dataset.section===sec));
    const titles={overview:'Dashboard',products:'Products',orders:'Orders',customers:'Customers'};
    document.getElementById('section-title').textContent=titles[sec]||sec;
    renderSection(sec);
  }

  /* ── LOAD DATA ──────────────────────────────── */
  async function loadAll(){ await Promise.all([loadProducts(),loadOrders(),loadCustomers()]); renderSection(currentSection); }
  async function loadProducts(){ try{ const d=await API.get('/products'); products=d.products||[]; }catch{} }
  async function loadOrders()  { try{ const d=await API.get('/orders/admin/all'); orders=d.orders||[]; }catch{} }
  async function loadCustomers(){ try{ const d=await API.get('/auth/users'); customers=d.users||[]; }catch{} }

  /* ── RENDER SECTION ─────────────────────────── */
  function renderSection(sec){
    const el=document.getElementById('admin-content');
    if(sec==='overview')  renderOverview(el);
    else if(sec==='products')  renderProducts(el);
    else if(sec==='orders')    renderOrders(el);
    else if(sec==='customers') renderCustomers(el);
  }

  /* ──────────────────────────────────────────── */
  /* ── OVERVIEW ───────────────────────────────── */
  function renderOverview(el){
    const pending = orders.filter(o=>o.status==='pending').length;
    el.innerHTML=`
      <div class="section-content">
        <div class="stats-grid">
          ${statCard('fa-shirt','Total Products',products.length,'si-gold')}
          ${statCard('fa-box','Total Orders',orders.length,'si-green')}
          ${statCard('fa-users','Customers',customers.length,'si-blue')}
          ${statCard('fa-clock','Pending Orders',pending,'si-orange')}
        </div>
        <div class="two-col">
          <!-- Recent Orders -->
          <div class="admin-card">
            <div class="card-head">
              <strong>Recent Orders</strong>
              <button class="btn btn-ghost btn-sm" onclick="navigateTo('orders')">View All</button>
            </div>
            ${orders.length===0 ? emptyState('fa-box','No orders yet') : `
            <div class="table-wrap">
              <table class="admin-table">
                <tbody>
                  ${orders.slice(0,5).map(o=>`
                    <tr>
                      <td class="td-muted">#${o.id}</td>
                      <td><strong>${o.customer_name||'—'}</strong></td>
                      <td style="color:var(--gold);font-weight:700">${formatKES(o.total_price)}</td>
                      <td><span class="badge badge-${o.status}">${o.status}</span></td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
          <!-- Low Stock -->
          <div class="admin-card">
            <div class="card-head">
              <strong>Low / Out of Stock</strong>
              <button class="btn btn-ghost btn-sm" onclick="navigateTo('products')">Manage</button>
            </div>
            ${products.filter(p=>p.stock_quantity<=5).length===0
              ? `<div style="display:flex;flex-direction:column;align-items:center;padding:2.5rem;color:var(--success);gap:.5rem"><i class="fa-solid fa-circle-check" style="font-size:2rem;opacity:.6"></i><p style="font-size:.9rem">All products well stocked!</p></div>`
              : `<div class="table-wrap"><table class="admin-table"><tbody>
                  ${products.filter(p=>p.stock_quantity<=5).map(p=>`
                    <tr>
                      <td>
                        <div style="display:flex;align-items:center;gap:.6rem">
                          <img src="${p.image_url||'/images/store1.jpg'}" style="width:32px;height:32px;border-radius:6px;object-fit:cover" onerror="this.src='/images/store1.jpg'" alt="">
                          <span style="font-size:.83rem">${p.name}</span>
                        </div>
                      </td>
                      <td>
                        <span style="color:${p.stock_quantity===0?'var(--danger)':'var(--warning)'};font-weight:700;font-size:.8rem">
                          ${p.stock_quantity===0?'<i class="fa-solid fa-triangle-exclamation"></i> Out of Stock':'<i class="fa-solid fa-bolt"></i> '+p.stock_quantity+' left'}
                        </span>
                      </td>
                    </tr>`).join('')}
                </tbody></table></div>`
            }
          </div>
        </div>
      </div>`;
  }

  function statCard(icon,label,value,colorClass){
    return `<div class="stat-card">
      <div class="stat-icon ${colorClass}"><i class="fa-solid ${icon}"></i></div>
      <div class="stat-info"><p>${label}</p><h3>${value??'—'}</h3></div>
    </div>`;
  }
  function emptyState(icon,text){
    return `<div style="display:flex;flex-direction:column;align-items:center;padding:3rem 1rem;color:var(--white-50);gap:.5rem;text-align:center"><i class="fa-solid ${icon}" style="font-size:2rem;opacity:.4"></i><p>${text}</p></div>`;
  }

  /* ── PRODUCTS ────────────────────────────────── */
  let prodSearch='', prodCat='';
  function renderProducts(el){
    const filtered=products.filter(p=>
      (!prodCat||p.category===prodCat)&&
      (!prodSearch||p.name.toLowerCase().includes(prodSearch.toLowerCase()))
    );
    el.innerHTML=`
      <div class="section-content">
        <div class="section-toolbar">
          <div class="toolbar-left">
            <div class="admin-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="prod-search" placeholder="Search products…" value="${prodSearch}">
            </div>
            <select class="admin-select" id="prod-cat">
              <option value="">All Categories</option>
              <option value="men"         ${prodCat==='men'?'selected':''}>Men</option>
              <option value="women"       ${prodCat==='women'?'selected':''}>Women</option>
              <option value="kids"        ${prodCat==='kids'?'selected':''}>Kids</option>
              <option value="accessories" ${prodCat==='accessories'?'selected':''}>Accessories</option>
            </select>
          </div>
          <button class="btn btn-gold" id="add-product-btn"><i class="fa-solid fa-plus"></i> Add Product</button>
        </div>
        <div class="admin-card">
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${filtered.length===0
                  ? `<tr><td colspan="6">${emptyState('fa-shirt','No products found')}</td></tr>`
                  : filtered.map(p=>{
                    const sc=p.stock_quantity===0?'var(--danger)':p.stock_quantity<=5?'var(--warning)':'var(--success)';
                    const sl=p.stock_quantity===0?'Out of stock':`${p.stock_quantity} units`;
                    return `<tr>
                      <td>
                        <div class="product-cell">
                          <img src="${p.image_url||'/images/store1.jpg'}" class="product-thumb" onerror="this.src='/images/store1.jpg'" alt="">
                          <div>
                            <strong>${p.name}</strong>
                            <span>${(p.description||'').substring(0,42)}${(p.description||'').length>42?'…':''}</span>
                          </div>
                        </div>
                      </td>
                      <td><span class="badge badge-${p.category==='men'?'blue':p.category==='women'?'cancelled':p.category==='kids'?'delivered':'gold'}">${p.category}</span></td>
                      <td style="font-weight:700;color:var(--gold)">${formatKES(p.price)}</td>
                      <td><span style="color:${sc};font-weight:700;font-size:.82rem">${sl}</span></td>
                      <td><span style="color:${p.is_active?'var(--success)':'var(--danger)'};font-size:.8rem">${p.is_active?'● Active':'○ Hidden'}</span></td>
                      <td>
                        <div style="display:flex;gap:.4rem">
                          <button class="btn btn-ghost btn-sm" onclick='openProductModal(${JSON.stringify(p)})'><i class="fa-solid fa-pen"></i> Edit</button>
                          <button class="btn btn-danger btn-sm" onclick="confirmDelete(${p.id},'${p.name.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                      </td>
                    </tr>`;}).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    document.getElementById('prod-search').addEventListener('input',function(){ prodSearch=this.value; renderSection('products'); });
    document.getElementById('prod-cat').addEventListener('change',function(){ prodCat=this.value; renderSection('products'); });
    document.getElementById('add-product-btn').addEventListener('click',()=>openProductModal(null));
  }

  /* ── ORDERS ──────────────────────────────────── */
  let orderSearch='', orderStatus='';
  function renderOrders(el){
    const filtered=orders.filter(o=>
      (!orderStatus||o.status===orderStatus)&&
      (!orderSearch||String(o.id).includes(orderSearch)||(o.customer_name||'').toLowerCase().includes(orderSearch.toLowerCase()))
    );
    el.innerHTML=`
      <div class="section-content">
        <div class="section-toolbar">
          <div class="toolbar-left">
            <div class="admin-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="ord-search" placeholder="Search orders…" value="${orderSearch}">
            </div>
            <select class="admin-select" id="ord-status">
              <option value="">All Statuses</option>
              <option value="pending"   ${orderStatus==='pending'?'selected':''}>Pending</option>
              <option value="confirmed" ${orderStatus==='confirmed'?'selected':''}>Confirmed</option>
              <option value="shipped"   ${orderStatus==='shipped'?'selected':''}>Shipped</option>
              <option value="delivered" ${orderStatus==='delivered'?'selected':''}>Delivered</option>
              <option value="cancelled" ${orderStatus==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </div>
        </div>
        <div class="admin-card">
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr><th>#</th><th>Customer</th><th>Items</th><th>Total</th><th>Phone</th><th>Date</th><th>Status</th></tr>
              </thead>
              <tbody>
                ${filtered.length===0
                  ? `<tr><td colspan="7">${emptyState('fa-box','No orders found')}</td></tr>`
                  : filtered.map(o=>`<tr>
                    <td class="td-muted">#${o.id}</td>
                    <td>
                      <strong style="font-size:.85rem">${o.customer_name||'—'}</strong>
                      <div style="font-size:.75rem;color:var(--white-50)">${o.customer_email||''}</div>
                    </td>
                    <td class="td-muted">${o.item_count||0} item(s)</td>
                    <td style="font-weight:700;color:var(--gold)">${formatKES(o.total_price)}</td>
                    <td class="td-muted">${o.phone_number||'—'}</td>
                    <td class="td-muted">${formatDate(o.created_at)}</td>
                    <td>
                      <select class="status-select" onchange="updateOrderStatus(${o.id},this.value)">
                        ${['pending','confirmed','shipped','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
                      </select>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    document.getElementById('ord-search').addEventListener('input',function(){ orderSearch=this.value; renderSection('orders'); });
    document.getElementById('ord-status').addEventListener('change',function(){ orderStatus=this.value; renderSection('orders'); });
  }

  async function updateOrderStatus(id,status){
    try{
      await API.patch(`/orders/${id}/status`,{status});
      const o=orders.find(x=>x.id===id); if(o) o.status=status;
      showToast(`Order #${id} → ${status}`,'success');
      renderSection('orders');
    }catch(err){ showToast(err.message||'Failed to update status.','error'); }
  }

  /* ── CUSTOMERS ───────────────────────────────── */
  let custSearch='';
  function renderCustomers(el){
    const filtered=customers.filter(u=>
      !custSearch||
      u.name.toLowerCase().includes(custSearch.toLowerCase())||
      u.email.toLowerCase().includes(custSearch.toLowerCase())
    );
    el.innerHTML=`
      <div class="section-content">
        <div class="section-toolbar">
          <div class="toolbar-left">
            <div class="admin-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="cust-search" placeholder="Search customers…" value="${custSearch}">
            </div>
          </div>
        </div>
        <div class="admin-card">
          <div class="table-wrap">
            <table class="admin-table">
              <thead>
                <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr>
              </thead>
              <tbody>
                ${filtered.length===0
                  ? `<tr><td colspan="5">${emptyState('fa-users','No customers found')}</td></tr>`
                  : filtered.map((u,i)=>`<tr>
                    <td class="td-muted">${i+1}</td>
                    <td><strong>${u.name}</strong></td>
                    <td class="td-muted">${u.email}</td>
                    <td><span class="badge ${u.role==='admin'?'badge-gold':'badge-blue'}">${u.role}</span></td>
                    <td class="td-muted">${formatDate(u.created_at)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    document.getElementById('cust-search').addEventListener('input',function(){ custSearch=this.value; renderSection('customers'); });
  }

  /* ── PRODUCT MODAL ───────────────────────────── */
  let currentEditProduct=null;
  let uploadedImageUrl='';

  function openProductModal(product){
    currentEditProduct=product;
    uploadedImageUrl=product?.image_url||'';
    const isEdit=!!product?.id;
    openModal(`
      <div class="modal-box modal-box-wide animate-scale" style="max-width:640px">
        <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        <h3 style="font-family:var(--font-serif);font-size:1.5rem;font-weight:600;margin-bottom:1.5rem">${isEdit?'Edit Product':'Add New Product'}</h3>
        <div id="prod-modal-err" class="form-error" style="display:none"></div>
        <div class="prod-modal-grid">
          <div class="form-group fg-full">
            <label>Product Name *</label>
            <input type="text" id="pm-name" value="${esc(product?.name||'')}" placeholder="e.g. Nike Air Max">
          </div>
          <div class="form-group fg-full">
            <label>Description</label>
            <textarea id="pm-desc" placeholder="Brief product description…">${esc(product?.description||'')}</textarea>
          </div>
          <div class="form-group">
            <label>Price (KES) *</label>
            <input type="number" id="pm-price" value="${product?.price||''}" placeholder="e.g. 3500" min="1">
          </div>
          <div class="form-group">
            <label>Stock Quantity *</label>
            <input type="number" id="pm-stock" value="${product?.stock_quantity??''}" placeholder="e.g. 20" min="0">
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="pm-cat">
              <option value="">Select category</option>
              <option value="men"         ${product?.category==='men'?'selected':''}>Men</option>
              <option value="women"       ${product?.category==='women'?'selected':''}>Women</option>
              <option value="kids"        ${product?.category==='kids'?'selected':''}>Kids</option>
              <option value="accessories" ${product?.category==='accessories'?'selected':''}>Accessories</option>
            </select>
          </div>
          <div class="form-group">
            <label>Product Image</label>
            <input type="file" id="pm-file" accept="image/*" style="display:none">
            <button type="button" class="btn btn-ghost" id="pm-upload-btn"><i class="fa-solid fa-upload"></i> Choose Image</button>
            ${product?.image_url?`<img src="${product.image_url}" class="img-preview" id="pm-preview" onerror="this.style.display='none'" alt="">`:'<img class="img-preview" id="pm-preview" style="display:none" alt="">'}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-gold" id="pm-save"><i class="fa-solid fa-floppy-disk"></i> ${isEdit?'Update Product':'Add Product'}</button>
        </div>
      </div>
    `,{wide:true});

    document.getElementById('pm-upload-btn').addEventListener('click',()=>document.getElementById('pm-file').click());
    document.getElementById('pm-file').addEventListener('change', handleImageUpload);
    document.getElementById('pm-save').addEventListener('click', saveProduct);
  }

  async function handleImageUpload(e){
    const file=e.target.files[0]; if(!file) return;
    const preview=document.getElementById('pm-preview');
    if(preview){ preview.src=URL.createObjectURL(file); preview.style.display='block'; }
    const btn=document.getElementById('pm-upload-btn');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Uploading…';
    const fd=new FormData(); fd.append('image',file);
    try{
      const data=await API.upload('/products/upload-image',fd);
      uploadedImageUrl=data.imageUrl;
      showToast('Image uploaded!','success');
    }catch(err){ showToast(err.message||'Image upload failed.','error'); }
    finally{ btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-upload"></i> Choose Image'; }
  }

  async function saveProduct(){
    const errEl=document.getElementById('prod-modal-err');
    const name  = document.getElementById('pm-name')?.value.trim();
    const desc  = document.getElementById('pm-desc')?.value.trim();
    const price = document.getElementById('pm-price')?.value;
    const stock = document.getElementById('pm-stock')?.value;
    const cat   = document.getElementById('pm-cat')?.value;
    errEl.style.display='none';
    if(!name||!price||!cat||stock===''){errEl.textContent='Name, price, category and stock are required.';errEl.style.display='block';return;}
    if(Number(price)<=0){errEl.textContent='Price must be greater than 0.';errEl.style.display='block';return;}
    const btn=document.getElementById('pm-save');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving…';
    const body={ name, description:desc, price:parseFloat(price), stock_quantity:parseInt(stock), category:cat, image_url:uploadedImageUrl||currentEditProduct?.image_url||'/images/store1.jpg' };
    try{
      if(currentEditProduct?.id){
        await API.put(`/products/${currentEditProduct.id}`,body);
        showToast('Product updated!','success');
      }else{
        await API.post('/products',body);
        showToast('Product added!','success');
      }
      closeModal();
      await loadProducts();
      renderSection('products');
    }catch(err){
      errEl.textContent=err.message||'Save failed.'; errEl.style.display='block';
      btn.disabled=false; btn.innerHTML=`<i class="fa-solid fa-floppy-disk"></i> ${currentEditProduct?.id?'Update Product':'Add Product'}`;
    }
  }

  /* ── DELETE CONFIRM ──────────────────────────── */
  function confirmDelete(id,name){
    openModal(`
      <div class="modal-box animate-scale confirm-modal" style="max-width:380px">
        <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
        <div class="confirm-icon"><i class="fa-solid fa-trash-can" style="color:var(--danger)"></i></div>
        <h4>Delete Product?</h4>
        <p>This will remove "<strong>${esc(name)}</strong>" from the store. This action cannot be undone.</p>
        <div class="confirm-actions">
          <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
          <button class="btn btn-danger btn-full" id="confirm-del-btn">
            <i class="fa-solid fa-trash-can"></i> Delete
          </button>
        </div>
      </div>`);
    document.getElementById('confirm-del-btn').addEventListener('click', async ()=>{
      const btn=document.getElementById('confirm-del-btn');
      btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Deleting…';
      try{
        await API.delete(`/products/${id}`);
        products=products.filter(p=>p.id!==id);
        showToast('Product deleted.','success');
        closeModal();
        renderSection('products');
      }catch(err){ showToast(err.message||'Delete failed.','error'); btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-trash-can"></i> Delete'; }
    });
  }

  /* ── HELPERS ─────────────────────────────────── */
  function esc(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

  /* ── MODAL system override for admin ────────── */
  function openModal(html, opts={}){
    closeModal();
    const overlay=document.createElement('div');
    overlay.className='modal-overlay'; overlay.id='active-modal';
    overlay.innerHTML=html;
    document.body.appendChild(overlay);
    document.body.style.overflow='hidden';
    overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
    const closeBtn=overlay.querySelector('.modal-close');
    if(closeBtn) closeBtn.addEventListener('click',closeModal);
    return overlay;
  }
  function closeModal(){
    const m=document.getElementById('active-modal');
    if(m){ m.remove(); document.body.style.overflow=''; }
  }
  </script>
</body>
</html>
