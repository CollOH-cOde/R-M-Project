<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order — R &amp; M Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { background: var(--black); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TRACK HEADER ─────────────────────────── */
    .track-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(8,8,8,.9);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .track-brand {
      display: flex; align-items: center; gap: .75rem;
      font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600;
    }
    .track-brand img { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; }
    .track-brand em { color: var(--gold); font-style: italic; }
    .track-back { font-size: .85rem; color: var(--white-70); display: flex; align-items: center; gap: .4rem; transition: color var(--transition); }
    .track-back:hover { color: var(--gold); }

    /* ── HERO ─────────────────────────────────── */
    .track-hero {
      text-align: center; padding: 5rem 1.5rem 3rem;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,163,115,.12) 0%, transparent 65%);
    }
    .track-hero h1 { font-family: var(--font-serif); font-size: clamp(2.5rem,5vw,4rem); font-weight: 600; margin-bottom: .5rem; }
    .track-hero h1 span { color: var(--gold); font-style: italic; }
    .track-hero p { color: var(--white-50); font-size: .95rem; margin-top: .5rem; }

    /* ── SEARCH BOX ───────────────────────────── */
    .track-search-wrap { max-width: 560px; margin: 0 auto; padding: 0 1.5rem 3rem; }
    .track-box {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      backdrop-filter: blur(16px);
    }
    .track-box label { display: block; font-size: .8rem; font-weight: 600; color: var(--white-70); letter-spacing: .05em; margin-bottom: .6rem; }
    .track-row { display: flex; gap: .6rem; }
    .track-row .search-field { flex: 1; }
    .search-field { position: relative; }
    .search-field i { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--white-50); font-size: .85rem; pointer-events: none; }
    .search-field input {
      width: 100%; padding: .7rem 1rem .7rem 2.5rem;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 8px; font-size: .9rem; color: var(--white); outline: none;
      transition: border-color var(--transition);
    }
    .search-field input:focus { border-color: var(--gold); }
    .search-field input::placeholder { color: var(--white-50); }
    .track-hint { font-size: .77rem; color: var(--white-50); margin-top: .75rem; }

    /* ── RESULT AREA ──────────────────────────── */
    .track-result-wrap { max-width: 720px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    .track-error {
      display: flex; align-items: center; gap: .75rem;
      padding: 1.25rem 1.5rem;
      background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3);
      border-radius: var(--radius); color: #ff7675; font-size: .9rem;
    }

    /* ── RESULT CARD ──────────────────────────── */
    .result-card {
      background: rgba(255,255,255,.04); border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px); overflow: hidden;
      animation: slideUp .4s ease;
    }
    .result-card-head {
      padding: 1.75rem 2rem;
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 2px solid;
      flex-wrap: wrap; gap: 1rem;
    }
    .result-card-head h2 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 600; }
    .result-card-head p { font-size: .82rem; color: var(--white-50); margin-top: .2rem; }

    /* ── TIMELINE ─────────────────────────────── */
    .timeline-wrap { padding: 2rem; border-bottom: 1px solid var(--glass-border); }
    .timeline-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--white-50); margin-bottom: 1.5rem; }
    .timeline-track-outer { position: relative; padding-bottom: 1.5rem; }
    .timeline-rail {
      position: absolute; top: 22px; left: calc(22px + 0px); right: calc(22px + 0px);
      height: 3px; background: var(--glass-border); border-radius: 3px; z-index: 0;
    }
    .timeline-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--gold); border-radius: 3px; transition: width 1s ease; }
    .timeline-steps { display: flex; justify-content: space-between; position: relative; z-index: 1; }
    .tl-step { display: flex; flex-direction: column; align-items: center; gap: .5rem; flex: 1; }
    .tl-circle {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--glass-border);
      background: var(--black-2);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; color: var(--white-50);
      transition: all .4s ease;
    }
    .tl-step.done .tl-circle { background: var(--gold-alpha); border-color: var(--gold); color: var(--gold); }
    .tl-step.active .tl-circle { background: var(--gold); border-color: var(--gold); color: var(--black); animation: goldPulse 2s infinite; }
    .tl-label { font-size: .75rem; color: var(--white-50); font-weight: 500; text-align: center; }
    .tl-step.done .tl-label, .tl-step.active .tl-label { color: var(--white); }
    .cancelled-note {
      display: flex; align-items: center; gap: .6rem; margin-top: 1rem;
      padding: .75rem 1rem; background: rgba(231,76,60,.1);
      border-radius: 8px; color: #ff7675; font-size: .82rem;
    }

    /* ── INFO GRID ────────────────────────────── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid var(--glass-border); }
    .info-item { padding: 1.25rem 2rem; border-right: 1px solid var(--glass-border); }
    .info-item:last-child { border-right: none; }
    .info-item span { font-size: .75rem; color: var(--white-50); text-transform: uppercase; letter-spacing: .08em; display: block; margin-bottom: .35rem; }
    .info-item strong { font-size: .9rem; }

    /* ── ORDER ITEMS ──────────────────────────── */
    .order-items-wrap { padding: 1.5rem 2rem; border-bottom: 1px solid var(--glass-border); }
    .track-item { display: flex; align-items: center; gap: 1rem; padding: .65rem 0; border-bottom: 1px solid var(--glass-border); }
    .track-item:last-child { border-bottom: none; }
    .track-item img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .track-item-info { flex: 1; }
    .track-item-info strong { display: block; font-size: .875rem; margin-bottom: .2rem; }
    .track-item-info span { font-size: .78rem; color: var(--white-50); }
    .track-item-price { font-family: var(--font-serif); font-size: 1rem; color: var(--gold); font-weight: 600; }

    /* ── ORDER TOTAL ──────────────────────────── */
    .order-total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 2rem; font-size: 1rem;
    }
    .order-total-row strong { font-family: var(--font-serif); font-size: 1.5rem; color: var(--gold); }

    /* ── HELP CARD ────────────────────────────── */
    .help-card {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      margin-top: 1.5rem; padding: 1.5rem 2rem;
      background: rgba(255,255,255,.04); border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
    }
    .help-card strong { font-size: .95rem; }
    .help-card p { font-size: .82rem; color: var(--white-50); margin-top: .2rem; }

    /* ── FOOTER ──────────────────────────────── */
    .track-footer { margin-top: auto; padding: 1.5rem 2rem; text-align: center; font-size: .8rem; color: var(--white-50); border-top: 1px solid var(--glass-border); }

    @media (max-width:600px){
      .track-header { padding: 1rem; }
      .track-row { flex-direction: column; }
      .info-grid { grid-template-columns: 1fr; }
      .info-item { border-right: none; border-bottom: 1px solid var(--glass-border); }
      .result-card-head { padding: 1.25rem; }
      .timeline-wrap, .order-items-wrap, .order-total-row { padding-left: 1.25rem; padding-right: 1.25rem; }
      .tl-label { font-size: .68rem; }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <!-- HEADER -->
  <header class="track-header">
    <a href="/" class="track-brand">
      <img src="/images/logo.jpg" alt="Logo" onerror="this.style.display='none'">
      R &amp; <em>M</em>&nbsp;Collection
    </a>
    <a href="/" class="track-back">
      <i class="fa-solid fa-arrow-left fa-sm"></i> Back to Store
    </a>
  </header>

  <!-- HERO -->
  <div class="track-hero">
    <p class="eyebrow"><i class="fa-solid fa-location-dot fa-sm"></i>&ensp;Order Status</p>
    <h1>Track Your <span>Order</span></h1>
    <p>Enter your order number to see the latest update</p>
  </div>

  <!-- SEARCH -->
  <div class="track-search-wrap">
    <div class="track-box">
      <label>Order Number</label>
      <div class="track-row">
        <div class="search-field">
          <i class="fa-solid fa-hashtag"></i>
          <input type="text" id="order-input" placeholder="e.g. 4 or #4" autocomplete="off">
        </div>
        <button class="btn btn-gold" id="track-btn">
          <i class="fa-solid fa-magnifying-glass"></i> Track
        </button>
      </div>
      <p class="track-hint"><i class="fa-regular fa-circle-info fa-xs"></i> Your order number was sent to your email when you placed the order</p>
    </div>
  </div>

  <!-- RESULT -->
  <div class="track-result-wrap" id="result-area"></div>

  <!-- FOOTER -->
  <footer class="track-footer">
    &copy; 2025 R &amp; M Collection &nbsp;·&nbsp; Eldoret, Kenya &nbsp;·&nbsp; +254 723 866 363
  </footer>

  <script src="/js/shared.js"></script>
  <script>
    const STEPS = [
      { key: 'pending',   icon: 'fa-clock',         label: 'Placed'    },
      { key: 'confirmed', icon: 'fa-circle-check',  label: 'Confirmed' },
      { key: 'shipped',   icon: 'fa-truck',          label: 'Shipped'   },
      { key: 'delivered', icon: 'fa-box-open',       label: 'Delivered' },
    ];
    const STATUS_IDX    = { pending:0, confirmed:1, shipped:2, delivered:3, cancelled:-1 };
    const STATUS_COLORS = { pending:'#f39c12', confirmed:'#3498db', shipped:'#9b59b6', delivered:'#27ae60', cancelled:'#e74c3c' };
    const PROGRESS_PCT  = [0,33,66,100];

    /* ── Auto-load from URL param ── */
    document.addEventListener('DOMContentLoaded',()=>{
      const params = new URLSearchParams(window.location.search);
      const id = params.get('order');
      if(id){ document.getElementById('order-input').value=id; trackOrder(); }
    });

    document.getElementById('track-btn').addEventListener('click', trackOrder);
    document.getElementById('order-input').addEventListener('keydown',e=>{ if(e.key==='Enter') trackOrder(); });

    async function trackOrder(){
      const raw  = document.getElementById('order-input').value.trim();
      const oid  = raw.replace(/#|\s/g,'');
      const area = document.getElementById('result-area');
      if(!oid||isNaN(Number(oid))||Number(oid)<1){
        area.innerHTML=`<div class="track-error"><i class="fa-solid fa-circle-xmark"></i><strong>Please enter a valid order number.</strong></div>`;
        return;
      }
      const btn=document.getElementById('track-btn');
      btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Tracking…';
      area.innerHTML='';
      try{
        const data = await API.get(`/orders/track/${oid}`);
        renderResult(data.order);
      }catch(err){
        area.innerHTML=`<div class="track-error"><i class="fa-solid fa-circle-xmark"></i><strong>${err.message||'Order not found. Please check your number and try again.'}</strong></div>`;
      }finally{
        btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-magnifying-glass"></i> Track';
      }
    }

    function renderResult(order){
      const area       = document.getElementById('result-area');
      const isCancelled= order.status==='cancelled';
      const stepIdx    = STATUS_IDX[order.status]??0;
      const pct        = isCancelled ? 0 : (PROGRESS_PCT[stepIdx]??0);
      const borderColor= STATUS_COLORS[order.status]||'var(--gold)';

      const timelineHTML = isCancelled
        ? `<div class="cancelled-note"><i class="fa-solid fa-circle-xmark"></i> This order was cancelled. Contact us if you have questions.</div>`
        : `
          <div class="timeline-track-outer">
            <div class="timeline-rail"><div class="timeline-fill" id="tl-fill" style="width:0%"></div></div>
            <div class="timeline-steps">
              ${STEPS.map((s,i)=>{
                const done  =!isCancelled&&i<=stepIdx;
                const active=!isCancelled&&i===stepIdx;
                return `<div class="tl-step ${done?'done':''} ${active?'active':''}">
                  <div class="tl-circle"><i class="fa-solid ${s.icon}"></i></div>
                  <span class="tl-label">${s.label}</span>
                </div>`;
              }).join('')}
            </div>
          </div>`;

      const itemsHTML = (order.items||[]).length ? `
        <div class="order-items-wrap">
          <p class="timeline-label" style="margin-bottom:1rem">Items in this Order</p>
          ${(order.items||[]).map(item=>`
            <div class="track-item">
              <img src="${item.image_url||'/images/store1.jpg'}" alt="${item.product_name}" onerror="this.src='/images/store1.jpg'">
              <div class="track-item-info">
                <strong>${item.product_name}</strong>
                <span>Qty: ${item.quantity} &times; ${formatKES(item.unit_price)}</span>
              </div>
              <span class="track-item-price">${formatKES(item.unit_price*item.quantity)}</span>
            </div>`).join('')}
        </div>` : '';

      area.innerHTML=`
        <div class="result-card">
          <div class="result-card-head" style="border-bottom-color:${borderColor}">
            <div>
              <h2>Order #${order.id}</h2>
              <p>Placed on ${formatDate(order.created_at)}</p>
            </div>
            <span class="badge badge-${order.status}">${order.status}</span>
          </div>

          <div class="timeline-wrap">
            <p class="timeline-label">Order Progress</p>
            ${timelineHTML}
          </div>

          <div class="info-grid">
            <div class="info-item">
              <span>Delivery Address</span>
              <strong>${order.delivery_address}</strong>
            </div>
            <div class="info-item">
              <span>Last Updated</span>
              <strong>${formatDateTime(order.updated_at)}</strong>
            </div>
          </div>

          ${itemsHTML}

          <div class="order-total-row">
            <span>Order Total</span>
            <strong>${formatKES(order.total_price)}</strong>
          </div>
        </div>

        <div class="help-card">
          <div>
            <strong>Need help with your order?</strong>
            <p>Our team is ready to assist you anytime.</p>
          </div>
          <a href="https://wa.me/+254751050968" target="_blank" rel="noreferrer" class="btn btn-gold">
            <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
          </a>
        </div>`;

      // Animate the progress bar after render
      setTimeout(()=>{
        const fill=document.getElementById('tl-fill');
        if(fill) fill.style.width=pct+'%';
      },100);
    }
  </script>
</body>
</html>
